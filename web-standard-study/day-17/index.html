<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생 시간표</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div class="hero-title-area">
          <p class="eyebrow">Student Timetable</p>
          <h1 id="page-title">2학년 1반 시간표</h1>
          <p class="sub-title">
            반과 선택과목을 고르면 나에게 맞는 주간 시간표가 표시됩니다.
          </p>
        </div>
      </section>

      <section class="layout">
        <aside class="control-card">
          <div class="control-section">
            <label for="class-select">반 선택</label>
            <select id="class-select"></select>
          </div>

          <div class="control-section">
            <label for="date-input">날짜 선택</label>
            <input id="date-input" type="date" />
            <p class="help-text">
              선택한 날짜가 포함된 주의 월~금 시간표를 보여줍니다.
            </p>
          </div>

          <div class="control-section">
            <div class="section-title">내 선택과목</div>
            <p class="help-text">
              학생마다 선택과목이 다를 수 있으니, 내가 듣는 과목명을 입력하거나
              선택합니다.
            </p>

            <div class="subject-list">
              <input
                id="subject1"
                list="subject-options"
                type="text"
                placeholder="선택과목 1 예: 지구과학"
              />
              <input
                id="subject2"
                list="subject-options"
                type="text"
                placeholder="선택과목 2 예: 화학"
              />
              <input
                id="subject3"
                list="subject-options"
                type="text"
                placeholder="선택과목 3 예: 물리학"
              />
            </div>

            <datalist id="subject-options"></datalist>
          </div>

          <div class="control-section memo-box">
            <div class="memo-title-row">
              <label for="memo-input">오늘의 메모</label>
              <span id="memo-status">자동 저장</span>
            </div>
            <textarea
              id="memo-input"
              rows="5"
              placeholder="준비물, 수행평가, 개인 메모 등을 적어보세요."
            ></textarea>
            <p class="help-text memo-help">
              메모는 브라우저의 localStorage에 자동 저장됩니다.
            </p>
          </div>
        </aside>

        <section class="timetable-card">
          <div class="table-top">
            <div>
              <strong>주간 시간표</strong>
              <p id="selected-info">
                선택과목을 고르면 이곳에 함께 표시됩니다.
              </p>
            </div>
            <span class="badge">월 ~ 금 / 1 ~ 7교시</span>
          </div>

          <div class="table-scroll">
            <table class="timetable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
