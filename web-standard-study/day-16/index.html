<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DummyJSON Products API 실습</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>DummyJSON Products API 실습</h1>
      <p>외부 상품 API 데이터를 가져와 화면에 렌더링합니다.</p>
    </header>

    <main class="container">
      <section class="panel">
        <h2>상품 검색과 필터</h2>

        <form id="search-form" class="search-form">
          <label for="search-input">검색어</label>
          <div class="search-row">
            <input
              id="search-input"
              type="text"
              placeholder="예: phone, laptop, beauty"
            />
            <button type="submit">검색</button>
          </div>
        </form>

        <div class="filter-row">
          <div>
            <label for="category-select">카테고리</label>
            <select id="category-select">
              <option value="">전체 카테고리</option>
            </select>
          </div>

          <button id="reset-button" type="button" class="secondary-button">
            전체 보기
          </button>
        </div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>상품 목록</h2>
          <p id="result-count" class="result-count">
            상품을 불러오는 중입니다.
          </p>
        </div>

        <p id="status-message" class="status-message">
          API 요청을 준비하고 있습니다.
        </p>
        <div id="product-list" class="product-list"></div>
      </section>

      <section class="panel">
        <h2>상품 상세</h2>
        <div id="product-detail" class="product-detail empty-detail">
          상품 카드에서 상세 보기 버튼을 클릭하면 상세 정보가 표시됩니다.
        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
