<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript DOM 이벤트</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>DOM 이벤트 실습</h1>
      <p>사용자의 행동에 반응하는 JavaScript를 학습합니다.</p>
    </header>

    <main class="container">
      <section class="practice-section">
        <h2>클릭 이벤트</h2>
        <button id="click-button" type="button">클릭해보세요</button>
        <p id="click-result">아직 버튼을 클릭하지 않았습니다.</p>
      </section>

      <section class="practice-section">
        <h2>입력 이벤트</h2>
        <label for="name-input">이름</label>
        <input id="name-input" type="text" placeholder="이름을 입력하세요" />
        <p id="name-result">입력 결과가 여기에 표시됩니다.</p>
      </section>

      <section class="practice-section">
        <h2>상품 추가 폼</h2>

        <form id="product-form">
          <div class="form-group">
            <label for="product-name">상품명</label>
            <input
              id="product-name"
              type="text"
              placeholder="상품명을 입력하세요"
            />
          </div>

          <div class="form-group">
            <label for="product-price">상품 가격</label>
            <input
              id="product-price"
              type="number"
              placeholder="상품 가격을 입력하세요"
            />
          </div>

          <button type="submit">상품 추가</button>
        </form>

        <p id="form-message" class="message"></p>
      </section>

      <section class="practice-section">
        <h2>상품 검색</h2>
        <label for="search-input">검색어</label>
        <input
          id="search-input"
          type="text"
          placeholder="상품명을 검색하세요"
        />
      </section>

      <section class="practice-section">
        <h2>상품 목록</h2>
        <div id="product-list" class="product-list"></div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
